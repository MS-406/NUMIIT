name: numiit

description: AI-powered ancient Indian coin inscription recognition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  sqflite: ^2.3.3+1
  sqflite_common_ffi_web: ^0.4.5+4
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  share_plus: ^10.0.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  lottie: ^3.1.2
  fl_chart: ^0.69.0
  photo_view: ^0.15.0
  image: ^4.2.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  uuid: ^4.5.1
  universal_io: ^2.2.2
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  webview_flutter: ^4.5.0
  dio: ^5.4.0
  sqflite_common_ffi: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/html/coinrecexpage1.html
    - assets/html/coinrecexpage2.html
  fonts:
    - family: KshatrapaBrahmi
      fonts:
        - asset: assets/fonts/kshatrapa.ttf
